name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check . --exclude venv --exclude frontend
      - run: ruff format --check . --exclude venv --exclude frontend

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: agentforge123
          POSTGRES_DB: agentforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql://agentforge:agentforge123@localhost:5432/agentforge_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test
          GROQ_API_KEY: test_key
        run: python -m pytest tests/ -v --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t agentforge:${{ github.sha }} .
