name: Deploy AgentForge

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short 2>/dev/null || echo "Tests done"

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 157.230.83.134
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /opt/agentforge
            git pull origin main
            docker-compose -f docker-compose.prod.yml up -d --build --force-recreate agentforge-api agentforge-worker
            sleep 10
            curl -f http://localhost:8002/api/v1/health && echo "Deploy successful" || echo "Health check failed"
