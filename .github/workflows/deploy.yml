name: Deploy AgentForge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: agentforge123
          POSTGRES_DB: agentforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql://agentforge:agentforge123@localhost:5432/agentforge_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test
          GROQ_API_KEY: test_key
        run: python -m pytest tests/ -v --tb=short

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 157.230.83.134
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /opt/agentforge || { mkdir -p /opt/agentforge && cd /opt/agentforge && git clone https://github.com/koushik717/agentforge.git .; }
            git pull origin main
            docker-compose -f docker-compose.prod.yml up -d --build --force-recreate
            echo "Waiting for services to start..."
            sleep 15
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8002/api/v1/health; then
                echo ""
                echo "Deploy successful!"
                exit 0
              fi
              echo "Attempt $i failed, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 5 attempts"
            docker-compose -f docker-compose.prod.yml logs --tail=50 agentforge-api
            exit 1
