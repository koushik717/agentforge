services:
  agentforge-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentforge-api
    hostname: api
    ports:
      - "8002:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://agentforge:agentforge123@agentforge-postgres:5432/agentforge
      REDIS_URL: redis://agentforge-redis:6379
      ENVIRONMENT: production
    depends_on:
      agentforge-postgres:
        condition: service_healthy
      agentforge-redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    networks:
      - agentforge-net

  agentforge-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentforge-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://agentforge:agentforge123@agentforge-postgres:5432/agentforge
      REDIS_URL: redis://agentforge-redis:6379
      ENVIRONMENT: production
    depends_on:
      agentforge-postgres:
        condition: service_healthy
      agentforge-redis:
        condition: service_healthy
    command: python -m runtime.worker
    restart: unless-stopped
    networks:
      - agentforge-net

  agentforge-postgres:
    image: postgres:16-alpine
    container_name: agentforge-postgres
    environment:
      POSTGRES_DB: agentforge
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforge123
    volumes:
      - agentforge_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agentforge-net

  agentforge-redis:
    image: redis:7-alpine
    container_name: agentforge-redis
    volumes:
      - agentforge_redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - agentforge-net

  agentforge-prometheus:
    image: prom/prometheus:latest
    container_name: agentforge-prometheus
    ports:
      - "9096:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - agentforge_prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - agentforge-api
    restart: unless-stopped
    networks:
      - agentforge-net

  agentforge-grafana:
    image: grafana/grafana:latest
    container_name: agentforge-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: agentforge2026
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - agentforge_grafana:/var/lib/grafana
    depends_on:
      - agentforge-prometheus
    restart: unless-stopped
    networks:
      - agentforge-net

volumes:
  agentforge_postgres:
  agentforge_redis:
  agentforge_prometheus:
  agentforge_grafana:

networks:
  agentforge-net:
    driver: bridge
