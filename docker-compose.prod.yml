services:
  # -- PostgreSQL (internal only) -----------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: agentforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentforge_prod_2026}
      POSTGRES_DB: agentforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -- Redis (internal only) ----------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agentforge-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -- AgentForge API -----------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentforge-api
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://agentforge:${POSTGRES_PASSWORD:-agentforge_prod_2026}@postgres:5432/agentforge
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/v1/health'); assert r.status_code == 200"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  # -- Background Worker ---------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentforge-worker
    restart: unless-stopped
    command: ["python", "-m", "runtime.worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://agentforge:${POSTGRES_PASSWORD:-agentforge_prod_2026}@postgres:5432/agentforge
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -- Prometheus ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: agentforge-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    depends_on:
      - api

  # -- Grafana -------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: agentforge-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-agentforge_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  prometheusdata:
    driver: local
  grafanadata:
    driver: local
